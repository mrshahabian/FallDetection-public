# 2D CNN Architecture Configuration
# Supports two variants: 2dcnn_resnet (CustomResNet) and 2dcnn_lenet (LeNetRegularized)

# CustomResNet Configuration
resnet:
  name: "CustomResNet"
  input_shape: [1, 32, 34]  # [C, H, W] where H=frames, W=2*J (x and y coords)
  backbone: "resnet18"
  pretrained: true  # Use pretrained ResNet-18 weights (first layer will be modified)
  num_classes: 6

# LeNetRegularized Configuration
lenet:
  name: "LeNetRegularized"
  input_shape: [1, 32, 34]  # [C, H, W] where H=frames, W=2*J (x and y coords)
  numChannels: 1
  classes: 6
  dropout_rate: 0.5
  weight_decay: 0.001



